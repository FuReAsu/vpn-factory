.prepare-tofu-template:
  before_script:
    - cd ${CI_PROJECT_DIR}/tofu/${PROVIDER}
    - IFS=',' read -r -a VARS <<< "$PROVIDER_VARS"
    - sed -i "s|dev|$CI_PIPELINE_ID|" backend.tf
    - echo "Setting global variables"
    - export TF_VAR_gl_user="$CI_USER"
    - export TF_VAR_gl_pat="$CI_PAT"
    - diff="${PROVIDER^^}"
    - |
      for VAR in "${VARS[@]}"; do
        if [ -n "${!VAR+x}" ]; then
          echo "$VAR is set"
          tfvar="${VAR#${diff}_}"
          tfvar_lc="${tfvar,,}"
          export TF_VAR_${tfvar_lc}="${!VAR}"
        else
          echo "$VAR is not set. Using default"
        fi
      done

.provision-tofu-template:
  needs: []
  stage: provision
  image: 
    name: fureasu346/opentofu:v1.11.5
    entrypoint: [""]
  script:
    - tofu init -input=false -reconfigure
    - tofu plan -input=false -out ${CI_PIPELINE_ID}.tfplan
    - tofu apply -input=false ${CI_PIPELINE_ID}.tfplan
    - tofu show -json > ${CI_PIPELINE_ID}.json
    - echo "Informing environment creation"
    - |
      curl -s -X POST \
        -d chat_id="${TELEGRAM_CHAT_ID}" \
        -d text="Environment [${CI_ENVIRONMENT_NAME}] has been provisioned at $(date)..." \
        https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage > /dev/null

  artifacts:
    paths:
      - ${CI_PROJECT_DIR}/tofu/${PROVIDER}/${CI_PIPELINE_ID}.json
    expire_in: 30 days
  cache:
    key: tofu-files
    paths:
      - ${CI_PROJECT_DIR}/tofu/${PROVIDER}/.terraform

.destroy-tofu-template:
  stage: destroy
  image: 
    name: fureasu346/opentofu:v1.11.5
    entrypoint: [""]
  script:
    - tofu init -input=false -reconfigure
    - |
      declare count=3
      declare success=false
      while [ "$count" -gt 0 ]; do
        echo "Trying to destroy resources, $count tries left..."
        tofu plan -input=false -destroy -out ${CI_PIPELINE_ID}.destroy.tfplan
        if tofu apply -input=false ${CI_PIPELINE_ID}.destroy.tfplan; then
          success=true
          break
        else
          echo "Destrying resources failed, trying after 10 seconds..."
          sleep 10
          count=$((count-1))
        fi
      done
      if [ "$success" = false ]; then
        echo "Destroying resources failed, exiting..."
        exit 1
      fi
    - echo "Resources successfully destroyed..."
    - echo "Deleting state file"
    - |
      curl --request DELETE \
        --header "Private-Token: $CI_PAT" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/terraform/state/${CI_PIPELINE_ID}-${PROVIDER}"
    - echo "Deployment torn down and tfstate file deleted"
    - echo "Informing environment deletion"
    - |
      curl -s -X POST \
        -d chat_id="${TELEGRAM_CHAT_ID}" \
        -d text="Environment [${CI_ENVIRONMENT_NAME}] has been torn down..." \
        https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage > /dev/null
  cache:
    key: tofu-files
    paths:
      - ${CI_PROJECT_DIR}/tofu/${PROVIDER}/.terraform
  manual_confirmation: "Are you sure you want to stop the vpn environment from this pipeline"
