.aws-rules: &aws-rules
  rules:
  - if: '$PROVIDER == "aws" && ($CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "api")'
    when: manual

.aws-tofu-template:
  <<: *aws-rules
  variables:
    AWS_REGION: "${REGION}"
    AWS_INSTANCE_TYPE: "${INSTANCE_TYPE}"
    PROVIDER_VARS: "AWS_REGION,AWS_INSTANCE_TYPE,AWS_ACCESS_KEY,AWS_SECRET_KEY,AWS_VPC_CIDR"

aws-provision:
  environment:
    name: aws-${REGION}
    on_stop: aws-tear-down
  extends:
    - .aws-tofu-template
    - .prepare-tofu-template
    - .provision-tofu-template

aws-tear-down:
  environment:
    name: aws-${REGION}
    action: stop
  extends:
    - .aws-tofu-template
    - .prepare-tofu-template
    - .destroy-tofu-template

aws-outline-install:
  <<: *aws-rules
  extends: 
    - .outline-install-template
    - .remote-access-template
  variables:
    SSH_USER: $AWS_SSH_USER

aws-outline-key-generate:
  <<: *aws-rules
  extends: [ .outline-key-template ]
