.aws-tofu-template:
  variables:
    AWS_REGION: $[[ inputs.region ]]
    AWS_INSTANCE_TYPE: $[[ inputs.instance-type ]]
    PROVIDER_VARS: "AWS_REGION,AWS_INSTANCE_TYPE,AWS_ACCESS_KEY,AWS_SECRET_KEY,AWS_VPC_CIDR"
  rules:
    - if: '"$[[ inputs.cloud-provider ]]" == "aws" && ($CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "api")'
      when: manual

aws-provision:
  extends:
    - .aws-tofu-template
    - .prepare-tofu-template
    - .provision-tofu-template

aws-tear-down:
  extends:
    - .aws-tofu-template
    - .prepare-tofu-template
    - .destroy-tofu-template

aws-outline-install:
  extends: 
    - .outline-install-template
    - .remote-access-template
  rules:
    - if: '"$[[ inputs.cloud-provider ]]" == "aws" && ($CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "api")'
      when: manual
  variables:
    SSH_USER: $AWS_SSH_USER

aws-outline-key-generate:
  extends: [ .outline-key-template ]
  rules:
    - if: '"$[[ inputs.cloud-provider ]]" == "aws" && ($CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "api")'
      when: manual
